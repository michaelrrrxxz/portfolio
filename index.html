<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <title>MichaelAngelo.dev</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }
    </style>

    <link href="/src/App.css" rel="stylesheet" />
    <link
      rel="shortcut icon"
      href="./src/assets/favicon.ico"
      type="image/x-icon"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      const originalTitle = document.title;
      const newTitle = "1 New Message";

      let toggle = false;

      setInterval(() => {
        document.title = toggle ? originalTitle : newTitle;
        toggle = !toggle;
      }, 1000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
